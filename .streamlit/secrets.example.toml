# ============================================================
# Example Streamlit Secrets — HMG Excel Operations Platform v2
# Copy the values you need into:  App Settings ▸ Secrets  (Streamlit Cloud)
# NEVER commit a real .streamlit/secrets.toml to GitHub.
# ============================================================

# ---- 1. Admin / Enterprise login ----
# Option A (recommended): store a SHA-256 HASH, not the plaintext password.
# Generate locally:  python -c "import hashlib;print(hashlib.sha256(('HMG-STATIC-SALT-v2'+'YourPassword').encode()).hexdigest())"
# Comma-separate multiple hashes for multiple admins.
# APP_PASSWORD_HASH = "paste-sha256-hash-here"

# Option B (simpler): plaintext password(s), comma-separated.
APP_PASSWORD = "ChangeThisStrongPassword"

# ---- 2. Disable demo logins in production ----
# The demo keys `admin` / `HMG2025` grant only the FREE tier. Set to "false"
# to disable them entirely once you have set your own password above.
ALLOW_DEMO_LOGIN = "true"

# ---- 3. License signing key (subscriptions) ----
# REQUIRED before issuing real Pro/Enterprise license keys. Use a long random string.
# Generate:  python -c "import secrets;print(secrets.token_urlsafe(48))"
# Without this, keys are signed with a PUBLIC demo key and are NOT secure.
LICENSE_SIGNING_KEY = "paste-a-long-random-secret-here"

# ---- 4. Public URL (SEO canonical tag) ----
APP_PUBLIC_URL = "https://your-app-name.streamlit.app/"

# ---- 5. Usage analytics log location (optional) ----
# Where to store the usage/event log (logins, license activations, key issuance).
# On Streamlit free tier the default file may reset on restart; point this at a
# persistent path/volume to retain history long-term.
USAGE_DB_PATH = "hmg_usage.db"

# ---- 6. White-label branding (optional, per deployment) ----
# JSON to re-skin the platform for one client. Get this from the
# White-Label tab ("Download brand JSON" / copy the JSON block).
# WHITE_LABEL_BRAND = '{"brand_name":"Acme Analytics","tagline":"Powered by Acme","accent":"#FF5A00","header_bg":"#101820","header_mid":"#1b2a3a","header_to":"#27496d","footer":"© Acme"}'

# ---- 7. Report delivery via free SMTP (optional) ----
# Use a free mailbox (Gmail App Password, Zoho, Brevo/Sendinblue SMTP, etc.).
# SMTP_HOST = "smtp.gmail.com"
# SMTP_PORT = "587"          # 587 = STARTTLS, 465 = SSL
# SMTP_USER = "you@gmail.com"
# SMTP_PASSWORD = "your-app-password"   # NOT your normal password — create an App Password
# SMTP_FROM = "you@gmail.com"
